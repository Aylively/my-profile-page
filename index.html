<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* MENU */
        nav {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        /* CONTAINER */
        .container {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
        }

        /* IMAGE */
        img {
            border-radius: 50%;
            margin-bottom: 10px;
        }

        /* FORM */
        input, textarea {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
        }

        input[type="submit"] {
            background-color: blue;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
